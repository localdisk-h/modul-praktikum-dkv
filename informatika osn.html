<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSN-K 2025 Random Challenge</title>
    <style>
        :root { --dark: #1e1e2e; --light: #cdd6f4; --accent: #89b4fa; --success: #a6e3a1; --danger: #f38ba8; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--light); display: flex; justify-content: center; padding: 20px; }
        #game-container { background: #313244; width: 100%; max-width: 800px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .header { background: var(--accent); color: var(--dark); padding: 25px; text-align: center; font-weight: 800; }
        .stats { display: flex; justify-content: space-between; padding: 15px 30px; background: #45475a; border-bottom: 2px solid var(--accent); }
        .question-box { padding: 40px; }
        .options { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 25px; }
        button { padding: 18px; border: 2px solid #585b70; border-radius: 10px; background: transparent; color: var(--light); cursor: pointer; transition: 0.2s; text-align: left; font-size: 16px; }
        button:hover:not(:disabled) { border-color: var(--accent); background: rgba(137, 180, 250, 0.1); }
        button.correct { background: var(--success) !important; color: var(--dark); border-color: var(--success); }
        button.wrong { background: var(--danger) !important; color: var(--dark); border-color: var(--danger); }
        pre { background: #181825; padding: 20px; border-radius: 8px; border-left: 4px solid var(--accent); overflow-x: auto; font-size: 0.9em; }
        .hidden { display: none; }
        #result-screen { text-align: center; padding: 60px; }
        .btn-main { background: var(--accent); color: var(--dark); font-weight: bold; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header"><h1>OSN-K INFORMATIKA 2025</h1><p>Randomized Diagnostic Test</p></div>
    
    <div id="start-screen" class="question-box">
        <h2>Siap untuk Simulasi?</h2>
        <p>Sistem akan memilih <strong>5 soal acak</strong> dari bank soal OSN 2025. Gunakan logika terbaikmu!</p>
        <button class="btn-main" onclick="startGame()">MULAI SEKARANG</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="stats">
            <span>Score: <b id="score">0</b></span>
            <span>Soal: <b id="q-count">1</b>/5</span>
        </div>
        <div class="question-box">
            <p id="question-text" style="font-size: 1.2em; line-height: 1.5;"></p>
            <div id="code-area"></div>
            <div class="options" id="options-container"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Evaluasi Selesai!</h2>
        <h1 id="final-score" style="font-size: 5em; color: var(--accent); margin: 20px 0;">0</h1>
        <p id="feedback" style="margin-bottom: 30px;"></p>
        <button class="btn-main" onclick="location.reload()">COBA LAGI (SOAL BARU)</button>
    </div>
</div>

<script>
    // Bank Soal Adaptasi OSN-K 2025
    const bankSoal = [
        { q: "Pak Dengklek memiliki 20 pohon dengan tinggi 1, 2, ..., 20. Jika ia menebang dengan batas ketinggian 7 (pohon > 7 dipotong), berapa total panjang potongan?", o: ["91", "101", "71", "84"], c: 0 },
        { q: "Jika A + B + C = 25 dan dibutuhkan minimal 20 bebek agar semua tipe biskuit dicicipi oleh minimal 1 bebek, berapa banyak triplet (A,B,C) yang mungkin?", o: ["15", "21", "25", "30"], c: 1 },
        { q: "Pak Dengklek menjentikkan jari 33 kali pada 26 kartu (A-Z). Kartu ke-10 (J) akan berisi huruf apa jika setiap jentikan menggeser posisi?", o: ["M", "Q", "S", "G"], c: 3 },
        { q: "Berapa banyak rute minimal dari titik (0,0) ke (186, 126) jika setiap langkah maksimal 11 unit?", o: ["28", "30", "33", "35"], c: 2 },
        { q: "Apa output dari fungsi TIGA(25) jika fungsinya adalah f(n) = f(n-1) + f(n-2) + f(n-3)?", o: ["Fibonacci Bertingkat", "Tribonacci", "Eksponensial", "Faktorial"], c: 1 },
        { q: "Diberikan array [3, 7, 1, 9, 4, 9], algoritma mencari nilai terbesar kedua akan menghasilkan:", o: ["9", "4", "7", "3"], c: 2 },
        { q: "Jika fungsi hijau(x, y, z) mengembalikan x % z, dan baris tersebut diganti menjadi hanya x, apakah hasilnya selalu sama?", o: ["Ya", "Tidak", "Hanya jika x < z", "Hanya jika z = 1"], c: 1 },
        { q: "Berapa minimal bebek yang diundang agar 7 tipe biskuit (masing-masing isi 5) pernah dicicipi oleh setidaknya 1 bebek?", o: ["31", "35", "40", "42"], c: 0 },
        { q: "Dalam logika proposisi: NOT (p OR (NOT q)) setara dengan:", o: ["NOT p AND q", "NOT p OR q", "p AND NOT q", "NOT p AND NOT q"], o_val: ["(NOT p) ∧ q", "(NOT p) ∨ q", "p ∧ (NOT q)", "¬p ∧ ¬q"], c: 0 },
        { q: "Manakah kompleksitas waktu yang paling efisien untuk mencari data di array terurut?", o: ["O(n)", "O(n^2)", "O(log n)", "O(n log n)"], c: 2 }
    ];

    let currentQ = 0;
    let score = 0;
    let selectedQuestions = [];

    function startGame() {
        // Ambil 5 soal acak
        selectedQuestions = bankSoal.sort(() => 0.5 - Math.random()).slice(0, 5);
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = selectedQuestions[currentQ];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('q-count').innerText = currentQ + 1;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.o.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correctIdx = selectedQuestions[currentQ].c;
        const allBtns = document.querySelectorAll('#options-container button');
        allBtns.forEach(b => b.disabled = true);

        if(idx === correctIdx) {
            score += 20;
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            allBtns[correctIdx].classList.add('correct');
        }

        document.getElementById('score').innerText = score;

        setTimeout(() => {
            currentQ++;
            if(currentQ < 5) showQuestion();
            else showResult();
        }, 1200);
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        document.getElementById('feedback').innerText = score >= 80 ? "Hebat! Logika komputasionalmu sangat kuat." : "Ayo pelajari lagi pola soal Pak Dengklek!";
    }
</script>
</body>
</html>
